name: Unzip Project

on:
  push:
    paths:
      - '*.zip'
  workflow_dispatch:

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Find and extract ZIP
        run: |
          ZIP_FILE=$(ls *.zip 2>/dev/null | head -n 1)
          if [ -z "$ZIP_FILE" ]; then
            echo "No ZIP file found."
            exit 1
          fi
          echo "Extracting $ZIP_FILE"
          mkdir -p extracted_temp
          unzip -o "$ZIP_FILE" -d extracted_temp
          # If there is a single top-level folder inside the zip, move its contents to extracted/
          if [ $(ls -1 extracted_temp | wc -l) -eq 1 ] && [ -d "extracted_temp/$(ls extracted_temp)" ]; then
            mv extracted_temp/$(ls extracted_temp)/* extracted/
            rmdir extracted_temp/$(ls extracted_temp)
            rmdir extracted_temp
          else
            mv extracted_temp/* extracted/
            rmdir extracted_temp
          fi
          rm "$ZIP_FILE"

      - name: Commit and push extracted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Auto-unzip project via Actions" || echo "No changes to commit"
          git push
