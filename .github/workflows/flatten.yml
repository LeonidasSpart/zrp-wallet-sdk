name: Flatten SDK

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  flatten:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Flatten directory
        run: |
          if [ -d "zrp-wallet-sdk-main" ]; then
            shopt -s dotglob
            mv zrp-wallet-sdk-main/* .
            rmdir zrp-wallet-sdk-main
          else
            echo "zrp-wallet-sdk-main not found, nothing to flatten"
            exit 1
          fi

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Flatten repo: move SDK files to root"
          git push
