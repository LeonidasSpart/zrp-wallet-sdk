name: Unzip Project

on:
  push:
    paths:
      - '*.zip'  # triggers when any zip is pushed

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract ZIP
        run: |
          unzip zrp-wallet-sdk.zip -d ./extracted
          rm zrp-wallet-sdk.zip  # optional: delete the zip after extraction

      - name: Commit and push extracted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Auto-unzip project via Actions" || echo "No changes to commit"
          git push
